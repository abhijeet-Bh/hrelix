name: Deployment

on:
  push:
    branches: [ deploy ]


jobs:
  build:
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Project
        run: mvn clean install -DskipTests

      - name: Login to dockerhub
        run: docker login -u ${{secrets.DOCKER_USERNAME}} -p ${{secrets.DOCKER_PASSWORD}}

      - name: Build Docker Image
        run: docker build -t abhibh/hrelix .

      - name: Publish to docker-hub
        run: docker push abhibh/hrelix:latest


  delpoy:
    needs: build
    runs-on: [ hrelix-runner ]
    steps:
      - name: Pull image from dockerhub
        run: docker pull abhibh/hrelix:latest

      - name: Remove old container
        run: docker rm -f helix-backend

      - name: Run Docker Container
        run: docker run -d -p 8080:8080 --name helix-backend abhibh/hrelix:latest
